# TradingAgents 配置

# LLM 配置（扁平格式）
llm_provider: "dashscope"
deep_think_llm: "glm-5"
quick_think_llm: "glm-5"
backend_url: "https://coding.dashscope.aliyuncs.com/v1"

output:
  language: "Chinese"
  log_level: "INFO"

# 数据源配置
data_vendors:
  core_stock_apis: "tushare_sqlite_mirror"
  technical_indicators: "tushare_sqlite_mirror"
  fundamental_data: "tushare_sqlite_mirror"
  news_data: "yfinance"

# 工具级别数据源配置（可选，优先级高于 data_vendors）
tool_vendors: {}
  # get_peg_ratio: "alpha_vantage"  # 示例：单个工具切换数据源

# 数据源路径配置（支持自定义路径）
vendor_paths:
  tushare: "datasource.tushare"
  yfinance: "datasource.yfinance"
  alpha_vantage: "datasource.alpha_vantage"
  tushare_sqlite_mirror: "datasource.tushare_sqlite_mirror"
  # my_metrics: "/path/to/my_metrics"
