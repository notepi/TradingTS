# Tools Registry - 单表管理工具定义
#
# 添加新工具只需在此文件加配置 + 在 datasource/{vendor}/ 写函数
#
# 文档规范：
# - description: 工具的简短说明
# - vendors: 支持此工具的数据源列表
# - 对于 get_indicators，indicators 列表定义支持的指标

tools:
  # core_stock_apis - 股票价格数据
  get_stock_data:
    category: core_stock_apis
    module_path: datasource.datahub.servers.market
    description: |
      股票价格数据（OHLCV）- 获取股票的历史行情数据。
      返回开盘价、最高价、最低价、收盘价、成交量。
    vendors: [tushare, yfinance, tushare_sqlite_mirror, alpha_vantage]

  # technical_indicators - 技术指标
  get_indicators:
    category: technical_indicators
    module_path: datasource.datahub.servers.indicator
    description: |
      技术指标工具 - 获取股票的各类技术分析指标。
      用于分析股票趋势、动量、超买超卖、波动率等情况。
    vendors: [tushare, yfinance, tushare_sqlite_mirror, alpha_vantage]

  # fundamental_data - 基本面数据
  get_fundamentals:
    category: fundamental_data
    module_path: datasource.datahub.servers.fundamental
    description: |
      基本面概览 - 获取公司的核心财务指标。
      包括市值、PE、PB、ROE、现金流等关键数据。
    vendors: [tushare, yfinance, tushare_sqlite_mirror, alpha_vantage]
  get_balance_sheet:
    category: fundamental_data
    module_path: datasource.datahub.servers.fundamental
    description: |
      资产负债表 - 获取公司的资产、负债、所有者权益数据。
      用于分析公司资产结构、负债水平、财务稳健性。
    vendors: [tushare, yfinance, tushare_sqlite_mirror, alpha_vantage]
  get_cashflow:
    category: fundamental_data
    module_path: datasource.datahub.servers.fundamental
    description: |
      现金流量表 - 获取公司经营、投资、筹资活动现金流。
      同时提供累计值和单季值，便于分析现金流趋势。
    vendors: [tushare, yfinance, tushare_sqlite_mirror, alpha_vantage]
  get_income_statement:
    category: fundamental_data
    module_path: datasource.datahub.servers.fundamental
    description: |
      利润表 - 获取公司的收入、成本、利润数据。
      用于分析公司盈利能力、毛利率、净利率变化。
    vendors: [tushare, yfinance, tushare_sqlite_mirror, alpha_vantage]
  get_peg_ratio:
    category: fundamental_data
    module_path: datasource.tushare.indicators.enhanced_data
    description: |
      PEG估值指标 - PEG = PE(TTM) / 净利润增长率。
      用于判断成长股估值是否合理。
      PEG < 1 相对低估，PEG > 1 相对高估。
    vendors: [tushare, tushare_sqlite_mirror]
  get_yoy_growth:
    category: fundamental_data
    module_path: datasource.tushare.indicators.enhanced_data
    description: |
      同比增长率数据 - 营收和净利润的同比增长率。
      同时提供累计值和单季值，含营收YOY和净利润YOY。
    vendors: [tushare, tushare_sqlite_mirror]

  # news_data - 新闻数据
  get_news:
    category: news_data
    module_path: datasource.datahub.servers.news
    description: |
      股票相关新闻 - 获取指定股票的最新新闻和公告。
      用于分析公司事件、重大公告对股价的影响。
    vendors: [yfinance, alpha_vantage]
  get_global_news:
    category: news_data
    module_path: datasource.datahub.servers.news
    description: |
      全球市场新闻 - 获取全球宏观经济、市场动态新闻。
      用于分析宏观因素对股票的影响。
    vendors: [yfinance, alpha_vantage]
  get_insider_transactions:
    category: news_data
    module_path: datasource.datahub.servers.news
    description: |
      内部交易数据 - 获取公司内部人员（高管、董事）的股票交易记录。
      用于分析内部人对公司前景的判断。
    vendors: [yfinance, alpha_vantage]

  # technical_analysis - 技术分析数据（预处理）
  get_price_daily:
    category: technical_analysis
    module_path: datasource.datahub.servers.market
    description: |
      技术分析行情数据 - 获取 OHLCV 基础数据用于技术分析。
      包含开盘价、最高价、最低价、收盘价、成交量。
      数据来源：price_daily 表（预处理后的技术分析专用数据）。
    vendors: [tushare_sqlite_mirror]

  get_trend_ma_daily:
    category: technical_analysis
    module_path: datasource.datahub.servers.market
    description: |
      均线趋势数据 - 获取移动平均线和趋势标签。
      包含 SMA(5/10/20/60)、EMA(12/26) 以及自动生成的趋势标签。
      用于判断股价短期、中期、长期趋势方向。
    vendors: [tushare_sqlite_mirror]

  get_momentum_volatility_daily:
    category: technical_analysis
    module_path: datasource.datahub.servers.market
    description: |
      动量波动数据 - 获取动量指标、波动率指标和状态标签。
      包含 RSI(6/12/24)、MACD、ATR(14) 以及超买超卖、MACD 信号等状态标签。
      用于判断股价动量强弱和波动风险。
    vendors: [tushare_sqlite_mirror]

  get_technical_labels_daily:
    category: technical_analysis
    module_path: datasource.datahub.servers.market
    description: |
      技术标签汇总 - 获取综合趋势、动量、风险标签。
      整合均线趋势、动量状态、波动风险的判断结果。
      提供整体技术面评估：趋势方向、动量强弱、风险等级。
    vendors: [tushare_sqlite_mirror]
